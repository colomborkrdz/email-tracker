<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Tracker — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e2023;
    --border: #2a2d32;
    --text: #e8e9eb;
    --muted: #6b7280;
    --accent: #22d3a0;
    --accent-dim: rgba(34,211,160,0.12);
    --warn: #f59e0b;
    --red: #ef4444;
    --blue: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; }
  .logo span { color: var(--accent); }
  .logo-admin { color: var(--muted); font-size: 12px; margin-left: 10px; letter-spacing: 0.06em; text-transform: uppercase; }

  .header-actions { display: flex; gap: 10px; }

  button {
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent); border: none; color: #0e0f11;
    padding: 8px 16px; font-weight: 500;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }

  .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 14px;
  }
  .btn-ghost:hover { color: var(--text); border-color: #444; }

  .btn-danger {
    background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--red);
    padding: 5px 10px; font-size: 12px;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.1); }

  .btn-activate {
    background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent);
    padding: 5px 10px; font-size: 12px;
  }
  .btn-activate:hover { background: rgba(34,211,160,0.2); }

  .btn-deactivate {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 10px; font-size: 12px;
  }
  .btn-deactivate:hover { color: var(--text); border-color: #444; }

  main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 28px; font-family: 'IBM Plex Mono', monospace; color: var(--accent); margin-top: 6px; font-weight: 500; }

  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  thead { background: var(--bg3); }

  th {
    text-align: left;
    padding: 11px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 13px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .email-cell { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .pill-active   { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
  .pill-trialing { background: rgba(96,165,250,0.1); color: var(--blue); border: 1px solid var(--blue); }
  .pill-past_due { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid var(--warn); }
  .pill-canceled, .pill-none { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }

  .pill-verified   { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
  .pill-unverified { background: rgba(245,158,11,0.1); color: var(--warn); border: 1px solid var(--warn); }

  .muted { color: var(--muted); }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; }

  #denied { display: none; text-align: center; padding: 64px 0; color: var(--muted); }
  #denied h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">✉ email<span>tracker</span></div>
    <span class="logo-admin">Admin</span>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="window.location.href='/app'">Dashboard</button>
    <button class="btn-ghost" onclick="logout()" style="color:var(--muted)">Sign out</button>
  </div>
</header>

<main>
  <div id="denied">
    <h2>Access denied</h2>
    <p>This page is only accessible to the seed user.</p>
    <br>
    <button class="btn-ghost" onclick="window.location.href='/app'">Go to Dashboard</button>
  </div>

  <div id="content" style="display:none">
    <div class="stats-row" id="stats"></div>

    <div class="section-title">Users</div>
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Joined</th>
          <th>Verified</th>
          <th>Subscription</th>
          <th>Trial ends</th>
          <th>Last login</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="user-table"></tbody>
    </table>
  </div>
</main>

<script>
const API = window.location.origin;

function getToken() { return localStorage.getItem('token'); }
function logout() { localStorage.removeItem('token'); window.location.href = '/login'; }

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

if (!getToken()) { window.location.href = '/login'; }

function fmt(iso) {
  if (!iso) return '<span class="muted">—</span>';
  return new Date(iso).toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' });
}

function fmtLogin(iso) {
  if (!iso) return '<span class="muted">Never</span>';
  const d = new Date(iso);
  return d.toLocaleDateString('en-CA', { year: 'numeric', month: 'short', day: 'numeric' }) +
    ' <span class="muted">' + d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' }) + '</span>';
}

function statusPill(s) {
  return `<span class="pill pill-${s}">${s}</span>`;
}

function verifiedPill(v) {
  return v
    ? '<span class="pill pill-verified">Yes</span>'
    : '<span class="pill pill-unverified">No</span>';
}

let allUsers = [];

async function load() {
  const res = await fetch(`${API}/api/admin/users`, {
    headers: { 'Authorization': `Bearer ${getToken()}` },
  });
  if (res.status === 401) { logout(); return; }
  if (res.status === 403) {
    document.getElementById('denied').style.display = 'block';
    return;
  }
  allUsers = await res.json();
  render(allUsers);
  document.getElementById('content').style.display = 'block';
}

function render(users) {
  // Stats
  const total = users.length;
  const active = users.filter(u => u.subscriptionStatus === 'active').length;
  const trialing = users.filter(u => u.subscriptionStatus === 'trialing').length;
  const unverified = users.filter(u => !u.emailVerified).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value">${active}</div></div>
    <div class="stat-card"><div class="stat-label">Trialing</div><div class="stat-value">${trialing}</div></div>
    <div class="stat-card"><div class="stat-label">Unverified</div><div class="stat-value">${unverified}</div></div>
  `;

  // Table
  document.getElementById('user-table').innerHTML = users.map(u => {
    const actions = [];
    if (u.subscriptionStatus !== 'active') {
      actions.push(`<button class="btn-activate" onclick="activate('${esc(u.id)}')">Activate</button>`);
    }
    if (u.subscriptionStatus !== 'none' && u.subscriptionStatus !== 'canceled') {
      actions.push(`<button class="btn-deactivate" onclick="deactivate('${esc(u.id)}')">Deactivate</button>`);
    }
    if (!u.isSeed) {
      actions.push(`<button class="btn-danger" onclick="deleteUser('${esc(u.id)}','${esc(u.email)}')">Delete</button>`);
    }

    return `<tr>
      <td class="email-cell">${esc(u.email)}</td>
      <td>${fmt(u.createdAt)}</td>
      <td>${verifiedPill(u.emailVerified)}</td>
      <td>${statusPill(u.subscriptionStatus)}</td>
      <td>${u.subscriptionStatus === 'trialing' ? fmt(u.trialEndsAt) : '<span class="muted">—</span>'}</td>
      <td>${fmtLogin(u.lastLogin)}</td>
      <td><div class="actions">${actions.join('')}</div></td>
    </tr>`;
  }).join('');
}

async function activate(id) {
  const res = await fetch(`${API}/api/admin/users/${id}`, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'activate' }),
  });
  if (res.ok) load();
  else alert('Failed to activate user.');
}

async function deactivate(id) {
  const res = await fetch(`${API}/api/admin/users/${id}`, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'deactivate' }),
  });
  if (res.ok) load();
  else alert('Failed to deactivate user.');
}

async function deleteUser(id, email) {
  if (!confirm(`Delete ${email}?\n\nThis will permanently delete the account and all tracked emails. This cannot be undone.`)) return;
  const res = await fetch(`${API}/api/admin/users/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${getToken()}` },
  });
  if (res.status === 400) {
    const { error } = await res.json();
    alert(error);
  } else if (res.ok) {
    load();
  } else {
    alert('Failed to delete user.');
  }
}

load();
</script>
</body>
</html>
